<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motivational Message</title>
  <style>
    body {
      background: #f0f0f0;
      font-family: Arial, sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    button {
      padding: 20px 40px;
      font-size: 1.5rem;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 12px;
      transition: 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    #message {
      margin-top: 30px;
      font-size: 1.3rem;
      text-align: center;
      max-width: 600px;
      color: #333;
    }
  </style>
</head>
<body>
  <button onclick="generateMessage()">Get Motivational Message</button>
  <div id="message"></div>

  <script src="MotivationalMessage.js"></script>
</body>
</html>
